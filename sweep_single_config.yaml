program: /home/walt/Attention/sweep_train_single.sh
command:
  - ${env}
  - ${program}
method: grid
run_cap: 1
metric:
  name: val_loss
  goal: minimize

parameters:
  hidden_dim:
    values: [512]
  # ffn_dim is auto-computed as hidden_dim * 4 in train_single.py
  num_heads:
    values: [8]
  num_layers:
    values: [2]
  learning_rate:
    values: [2e-4]
  batch_size:
    values: [4]
  epochs:
    values: [5]
  normalization:
    values: ["log1p_tpm"]
  ree_base:
    values: [100.0]
  weight_decay:
    values: [0.0]
  mask_ratio:
    values: [0.15]
  early_stopping:
    values: [false]
