# W&B mini sweep (mentor-guided): grid over learning rate × loss (6 trials: 3 LRs × 2 losses).
# Fixed architecture/runtime: hidden_dim=320, ffn_dim=1536, num_layers=2, batch_size=4.
# Fixed training constants: weight_decay=0, mask_ratio=0.15, ree_base=100, feature_type=favor+.
# Metric: val_mse (fair across loss types; logged each epoch from train.py).
#
# Create the sweep (run on laptop or login node with wandb CLI):
#   wandb sweep --project bridge-rna sweeps/walt_sweep.yaml
# Then submit one or more Savio jobs (each runs a single sweep trial):
#   export WANDB_SWEEP_ID="entity/bridge-rna/sweep_xxxx"
#   sbatch scripts/savio_wandb_sweep_agent.slurm
#
# See docs/savio_wandb_sweeps.md

program: train.py
method: grid
metric:
  name: val_mse
  goal: minimize

parameters:
  batch_size:
    value: 4
  learning_rate:
    values: [0.00015, 0.0002, 0.00025]
  weight_decay:
    value: 0
  mask_ratio:
    value: 0.15
  ffn_dim:
    value: 1536
  num_layers:
    value: 2
  hidden_dim:
    value: 320
  ree_base:
    value: 100
  feature_type:
    value: favor+
  loss:
    values: [mse, smooth_l1]

# Single-GPU launch avoids NCCL / DDP skew from uneven streaming shards per rank (Savio 2×1080 Ti).
command:
  - ${env}
  - torchrun
  - --standalone
  - --nproc_per_node=1
  - ${program}
