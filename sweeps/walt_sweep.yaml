# W&B sweep: grid learning_rate × num_layers (6 trials), loss locked to smooth_l1.
# Prior 6-run sweep: smooth_l1 beat mse on val_mse; LR refined around 2e-4.
# One MSE comparison run: use sweeps/walt_mse_anchor.yaml (1 trial at lr=2e-4, layers=2).
#
# Fixed: hidden_dim=320, ffn_dim=1536, batch_size=4, loss=smooth_l1,
#   weight_decay=0, mask_ratio=0.15, ree_base=100, feature_type=favor+.
# Metric: val_mse (logged every epoch in train.py).
#
# Create sweep (laptop or Savio login):
#   wandb sweep --project bridge-rna sweeps/walt_sweep.yaml
# Then: export WANDB_SWEEP_ID=... && sbatch --export=ALL scripts/savio_wandb_sweep_agent.slurm
#
# See docs/savio_wandb_sweeps.md

program: train.py
method: grid
metric:
  name: val_mse
  goal: minimize

parameters:
  batch_size:
    value: 4
  learning_rate:
    values: [0.00018, 0.0002, 0.00022]
  weight_decay:
    value: 0
  mask_ratio:
    value: 0.15
  ffn_dim:
    value: 1536
  num_layers:
    values: [2, 4]
  hidden_dim:
    value: 320
  ree_base:
    value: 100
  feature_type:
    value: favor+
  loss:
    value: smooth_l1

# Single-GPU: no NCCL / uneven streaming skew across ranks.
command:
  - ${env}
  - torchrun
  - --standalone
  - --nproc_per_node=1
  - ${program}
