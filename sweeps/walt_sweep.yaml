# W&B sweep — grid (12 trials).
#   loss × learning_rate × batch_size = 2 × 3 × 2 = 12
#
# Swept:
#   loss: mse | smooth_l1
#   learning_rate: 1.8e-4, 2e-4, 2.2e-4
#   batch_size: 2, 4
#
# Fixed (prior anchor): num_layers=2, hidden_dim=320, ffn_dim=1536,
#   weight_decay=0, mask_ratio=0.15, ree_base=100, feature_type=favor+.
# Metric: val_mse (train.py).
#
# Optional: sweeps/walt_mse_anchor.yaml — single MSE trial (redundant with loss=mse here).
#
# Create sweep (new ID after any YAML edit):
#   wandb sweep --project bridge-rna sweeps/walt_sweep.yaml
# Then: export WANDB_SWEEP_ID=... && sbatch --export=ALL scripts/savio_wandb_sweep_agent.slurm
#
# See docs/savio_wandb_sweeps.md

program: train.py
method: grid
metric:
  name: val_mse
  goal: minimize

parameters:
  batch_size:
    values: [2, 4]
  learning_rate:
    values: [0.00018, 0.0002, 0.00022]
  weight_decay:
    value: 0
  mask_ratio:
    value: 0.15
  ffn_dim:
    value: 1536
  num_layers:
    value: 2
  hidden_dim:
    value: 320
  ree_base:
    value: 100
  feature_type:
    value: favor+
  loss:
    values: [mse, smooth_l1]

# Single-GPU: avoids multi-rank NCCL issues on streaming.
command:
  - ${env}
  - torchrun
  - --standalone
  - --nproc_per_node=1
  - ${program}
