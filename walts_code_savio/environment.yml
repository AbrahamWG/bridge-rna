# Python 3.12 + conda-forge. Create with:
#   conda env create -f environment.yml
#   conda activate bridge-rna
#   pip install --upgrade pip
#   pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu124
#
# Savio: `module load conda` is wrong — use e.g. `module load anaconda3/2024.10-1-11.4`
# then `eval "$(conda shell.bash hook)"` or `source .../conda.sh` per `module spider anaconda3`.

name: bridge-rna
channels:
  - conda-forge
dependencies:
  - python=3.12
  - numpy
  - pandas
  - pyarrow
  - matplotlib
  - pip
  - pip:
      - wandb
